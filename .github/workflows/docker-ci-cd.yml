name: Docker CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        run: |
          docker build --pull --tag ecommerce-frontend:ci ./frontend

      - name: Build backend image
        run: |
          docker build --pull --tag ecommerce-backend:ci ./backend

      - name: Run frontend production build
        run: |
          docker run --rm ecommerce-frontend:ci ls /usr/share/nginx/html

      - name: Run backend tests
        run: |
          docker run --rm ecommerce-backend:ci python test_backend.py

      - name: Log in to Docker Hub
        if: secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN
        uses: docker/login-action@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker images to Docker Hub
        if: secrets.DOCKERHUB_USERNAME && secrets.DOCKERHUB_TOKEN
        run: |
          docker tag ecommerce-backend:ci ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-ecommerce-backend:latest
          docker tag ecommerce-frontend:ci ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-ecommerce-frontend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-ecommerce-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/devsecops-ecommerce-frontend:latest
